<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الإدارة | أكاديمية سلام</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/portal.css" />
</head>
<body class="portal-body admin-body">

  <div class="portal-container">
    <div class="portal-card admin-login-card">
      <div class="portal-header admin-header">
        <div class="portal-logo admin-logo">🔐</div>
        <h1>لوحة الإدارة</h1>
        <p>أكاديمية سلام - وصول مقيد</p>
      </div>

      <div id="loginView">
        <div class="form-group">
          <label>البريد الإلكتروني للمدير</label>
          <input type="email" id="adminEmail" placeholder="admin@salamacademy.kw" />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="adminPassword" placeholder="••••••••" />
        </div>
        <button class="btn-portal-primary admin-login-btn" onclick="adminLogin()">
          🔑 دخول لوحة الإدارة
        </button>
        <div id="errorMsg" class="error-msg" style="display:none"></div>
        <p class="portal-footer-note">
          <a href="../index.html">← العودة للموقع</a>
        </p>
      </div>

      <div id="loadingView" style="display:none" class="loading-view">
        <div class="spinner"></div>
        <p>جاري التحقق...</p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/admin-login.js"></script>
</body>
</html>
