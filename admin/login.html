<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>لوحة الإدارة | أكاديمية سلام</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/portal.css"/>
</head>
<body class="portal-body admin-body">
  <div class="portal-container">
    <div class="portal-card">
      <div class="portal-top-bar" style="background:linear-gradient(135deg,#0d0500,#3D1F0A)">
        <img src="../images/logo-en.png" alt="Salam Academy" class="portal-logo-img" style="filter:brightness(0) invert(1) opacity(0.7)"/>
        <h1>لوحة الإدارة</h1>
        <p>🔐 وصول محدود للمدراء فقط</p>
      </div>
      <div class="portal-body-pad" id="loginView">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="adminEmail" placeholder="admin@salamacademy.kw"/>
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="adminPassword" placeholder="••••••••"/>
        </div>
        <button class="btn-portal-primary" onclick="adminLogin()" style="background:linear-gradient(135deg,#0d0500,#3D1F0A)">
          🔑 دخول لوحة الإدارة
        </button>
        <div id="msgBox" class="error-msg" style="margin-top:12px"></div>
        <p class="portal-footer-note"><a href="../index.html">← العودة للموقع</a></p>
      </div>
      <div id="loadingView" style="display:none" class="loading-view">
        <div class="spinner"></div>
        <p>جاري التحقق...</p>
      </div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/admin-login.js"></script>
</body>
</html>
