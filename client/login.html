<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوابة الأعضاء | أكاديمية سلام</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/portal.css" />
</head>
<body class="portal-body">

  <div class="portal-container">
    <div class="portal-card">
      <div class="portal-header">
        <div class="portal-logo">🏆</div>
        <h1>أكاديمية سلام</h1>
        <p>بوابة الأعضاء</p>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginView">
        <div class="tab-toggle">
          <button class="tab-btn active" onclick="showTab('phone')">رقم الهاتف</button>
          <button class="tab-btn" onclick="showTab('email')">البريد الإلكتروني</button>
        </div>

        <!-- Phone OTP Login -->
        <div id="phoneTab">
          <div id="phoneStep1">
            <div class="form-group">
              <label>رقم الهاتف</label>
              <div class="phone-input-wrap">
                <span class="phone-prefix">+965</span>
                <input type="tel" id="loginPhone" placeholder="XXXXXXXX" maxlength="8" />
              </div>
            </div>
            <div id="recaptcha-container"></div>
            <button class="btn-portal-primary" onclick="sendOTP()">إرسال رمز التحقق</button>
          </div>

          <div id="phoneStep2" style="display:none">
            <p class="otp-hint">تم إرسال رمز التحقق إلى هاتفك</p>
            <div class="form-group">
              <label>رمز التحقق (OTP)</label>
              <input type="text" id="otpCode" placeholder="XXXXXX" maxlength="6" style="text-align:center;letter-spacing:8px;font-size:1.4rem" />
            </div>
            <button class="btn-portal-primary" onclick="verifyOTP()">تحقق وادخل</button>
            <button class="btn-portal-ghost" onclick="backToPhone()">← تغيير رقم الهاتف</button>
          </div>
        </div>

        <!-- Email Login -->
        <div id="emailTab" style="display:none">
          <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="loginEmail" placeholder="example@email.com" />
          </div>
          <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="loginPassword" placeholder="••••••••" />
          </div>
          <button class="btn-portal-primary" onclick="loginWithEmail()">تسجيل الدخول</button>
          <button class="btn-portal-ghost" onclick="showForgotPassword()">نسيت كلمة المرور؟</button>
        </div>

        <div class="divider"><span>أو</span></div>
        <a href="https://wa.me/96593000607" target="_blank" class="btn-portal-whatsapp">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          دعم عبر واتساب
        </a>

        <p class="portal-footer-note">
          <a href="../index.html">← العودة للرئيسية</a>
        </p>
      </div>

      <div id="loadingView" style="display:none" class="loading-view">
        <div class="spinner"></div>
        <p>جاري تحميل بياناتك...</p>
      </div>

      <div id="errorMsg" class="error-msg" style="display:none"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/client-login.js"></script>
</body>
</html>
